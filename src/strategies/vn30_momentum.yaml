name: "MACD Trend"
description: "Moving Average Convergence Divergence histogram and crossovers."
weight: 1.1
enabled: true
indicators_required: ["MACD_hist", "prev_MACD_hist"]
rules:
  - when: "MACD_hist > 0 and prev_MACD_hist <= 0"
    score: 75
    signal: BUY
    reason: "MACD Histogram bullish crossover (> 0)"
  - when: "MACD_hist < 0 and prev_MACD_hist >= 0"
    score: 25
    signal: SELL
    reason: "MACD Histogram bearish crossover (< 0)"
  - when: "MACD_hist > prev_MACD_hist"
    score: 60
    signal: BUY_WEAK
    reason: "MACD Histogram improving (rising)"
  - when: "MACD_hist < prev_MACD_hist"
    score: 40
    signal: SELL_WEAK
    reason: "MACD Histogram weakening (falling)"
  - default: true
    score: 50
    signal: NEUTRAL
    reason: "MACD Trend neutral"
