name: "Bollinger Bands"
description: "Volatility bands and mean reversion."
weight: 1.0
enabled: true
indicators_required: ["close", "BB_upper", "BB_lower", "BB_mid"]
rules:
  - when: "close < BB_lower"
    score: 70
    signal: BUY
    reason: "Price below Lower Band (Oversold/Mean Reversion)"
  - when: "close > BB_upper"
    score: 30
    signal: SELL
    reason: "Price above Upper Band (Overbought)"
  - when: "close > BB_mid"
    score: 55
    signal: NEUTRAL
    reason: "Price in Upper Half of Channel"
  - default: true
    score: 45
    signal: NEUTRAL
    reason: "Price in Lower Half of Channel"
