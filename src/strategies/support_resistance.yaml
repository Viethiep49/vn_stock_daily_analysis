name: "Support & Resistance"
description: "Proximity to 20-day local Support/Resistance."
weight: 0.7
enabled: true
indicators_required: ["close", "support_20", "resistance_20"]
rules:
  - when: "close <= support_20 * 1.01"
    score: 65
    signal: BUY
    reason: "Near Support Level"
  - when: "close >= resistance_20 * 0.99"
    score: 35
    signal: SELL
    reason: "Near Resistance Level"
  - default: true
    score: 50
    signal: NEUTRAL
    reason: "Trading between support and resistance"
